services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    ports:
      - "7070:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads-data:/app/public/uploads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  uploads-data:
