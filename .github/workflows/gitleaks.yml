name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan new commits (push)
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          # First push to a branch can have zero-ref as "before" — fall back to HEAD~1.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner \
            --log-opts="${BEFORE}..HEAD"

      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner \
            --log-opts="origin/${{ github.base_ref }}..HEAD"
